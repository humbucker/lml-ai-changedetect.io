services:
    changedetection:
      image: ghcr.io/dgtlmoon/changedetection.io
      container_name: changedetection
      hostname: changedetection
      volumes:
        - ./changedetection-data:/datastore
      environment:
        - PLAYWRIGHT_DRIVER_URL=ws://playwright-chrome:3000
      ports:
        - 5003:5000
      restart: unless-stopped
      depends_on:
        - playwright-chrome

    playwright-chrome:
      image: browserless/chrome
      restart: unless-stopped
      environment:
        - SCREEN_WIDTH=1920
        - SCREEN_HEIGHT=1024
        - SCREEN_DEPTH=16
        - ENABLE_DEBUGGER=false
        - PREBOOT_CHROME=true
        - CONNECTION_TIMEOUT=300000
        - MAX_CONCURRENT_SESSIONS=10
        - CHROME_REFRESH_TIME=600000
        - DEFAULT_BLOCK_ADS=true
        - DEFAULT_STEALTH=true

    venue-status-api:
      build: ./venue-status-api
      container_name: venue-status-api
      restart: unless-stopped
      ports:
        - 5002:8080
      volumes:
        - ./changedetection-data:/datastore:ro
        - ./venue-status-api:/app
      environment:
        - CHANGEDETECTION_API_KEY=6513b3615ff2019a061ecbbcc6fb4b42
        - DATASTORE_PATH=/datastore
      depends_on:
        - changedetection
